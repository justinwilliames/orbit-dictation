name: Whispur
options:
  bundleIdPrefix: team.yourorbit
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  Whispur:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: team.yourorbit.OrbitDictation
        PRODUCT_NAME: "Comet"
        MARKETING_VERSION: "0.1.0" # x-release-please-version
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: OrbitDictation.entitlements
        ENABLE_HARDENED_RUNTIME: true
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: true
    info:
      path: Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: Comet
        CFBundleName: Comet
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.productivity
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSMicrophoneUsageDescription: "Comet uses your microphone only when you start dictation, so it can capture speech and turn it into text."
        NSSpeechRecognitionUsageDescription: "Comet uses Apple's speech recognition when you choose the on-device Apple provider for local dictation."
        NSAccessibilityUsageDescription: "Comet uses Accessibility access to detect the focused text field and paste your transcript back where you're typing."
        NSHumanReadableCopyright: "© 2026 Justin Williames. Built on Whispur (MIT)."
        NSPrincipalClass: NSApplication
        NSSupportsAutomaticTermination: true
        SUFeedURL: https://github.com/justinwilliames/orbit-dictation/releases/latest/download/appcast.xml
        SUPublicEDKey: 4HZt8Wm9W7FCkufc4a8CneXFmCd9v3UM3dIa6ob2xXE=
        # Auto-check on by default — without this, Sparkle pops a
        # "check automatically?" prompt on first launch and a user
        # can accidentally opt out and never see another update.
        SUEnableAutomaticChecks: true
        # 30 min, mirroring Orion. Default is 86400 (24h), which during
        # active iteration leaves Sparkle perpetually one release behind:
        # Sir accepts a v0.X prompt, by then v0.X+1 has shipped, Sparkle
        # doesn't notice for another 24h. 1800s closes the gap without
        # being noisy.
        SUScheduledCheckInterval: 1800
        # URL scheme so AppDelegate can open the SwiftUI Settings scene via
        # `NSWorkspace.shared.open(comet://settings)` without needing the
        # SwiftUI `openWindow` environment action (which AppKit can't reach).
        CFBundleURLTypes:
          - CFBundleURLName: team.yourorbit.OrbitDictation.url
            CFBundleURLSchemes:
              - comet

  WhispurTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: Whispur
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: team.yourorbit.OrbitDictation.tests
        GENERATE_INFOPLIST_FILE: YES
